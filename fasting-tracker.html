<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast · Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c09;
    --surface: #181410;
    --card: #1e1a14;
    --border: #2e2820;
    --amber: #e8a630;
    --amber-dim: #a0721e;
    --amber-glow: rgba(232, 166, 48, 0.12);
    --text: #f0e8d8;
    --muted: #8a7a60;
    --danger: #c0503a;
    --success: #5a9e6f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 1000;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 36px 20px 60px;
  }

  header { text-align: center; margin-bottom: 36px; }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 2.4rem; color: var(--amber); letter-spacing: -0.02em; }
  header p { color: var(--muted); font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 4px; }

  /* Ring */
  .ring-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 28px; }
  .ring-wrap { position: relative; width: 220px; height: 220px; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 14; }
  .ring-prog { fill: none; stroke: var(--amber); stroke-width: 14; stroke-linecap: round; transition: stroke-dashoffset 1s ease, stroke 0.5s; }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
  .ring-time { font-family: 'DM Serif Display', serif; font-size: 2.6rem; color: var(--text); line-height: 1; letter-spacing: -0.02em; }
  .ring-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em; }
  .ring-phase { margin-top: 12px; font-size: 0.72rem; color: var(--amber); text-transform: uppercase; letter-spacing: 0.18em; text-align: center; min-height: 1.1em; }

  /* Insight button */
  .insight-trigger { margin-top: 14px; display: none; }
  .insight-trigger.visible { display: block; }

  .btn-insight {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 20px;
    border: 1px solid var(--amber-dim);
    border-radius: 99px;
    background: var(--amber-glow);
    color: var(--amber);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    animation: pulse-btn 3s ease-in-out infinite;
  }
  .btn-insight:hover { background: rgba(232,166,48,0.22); border-color: var(--amber); }
  @keyframes pulse-btn {
    0%, 100% { box-shadow: 0 0 0 0 rgba(232,166,48,0); }
    50% { box-shadow: 0 0 0 6px rgba(232,166,48,0.12); }
  }

  /* Insight Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(14,12,9,0.85);
    z-index: 500; align-items: flex-end; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal-panel {
    background: var(--card); border: 1px solid var(--border); border-bottom: none;
    border-radius: 20px 20px 0 0; width: 100%; max-width: 480px;
    padding: 28px 24px 40px;
    animation: slideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-height: 82vh; overflow-y: auto;
  }
  @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }

  .modal-phase-tag {
    display: inline-block; font-size: 0.62rem; padding: 3px 10px; border-radius: 99px;
    background: var(--amber-glow); color: var(--amber); border: 1px solid var(--amber-dim);
    text-transform: uppercase; letter-spacing: 0.13em; margin-bottom: 12px;
  }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--text); margin-bottom: 18px; line-height: 1.2; }

  .insight-block {
    border-left: 2px solid var(--amber-dim); padding: 10px 14px;
    margin-bottom: 12px; background: rgba(232,166,48,0.04); border-radius: 0 8px 8px 0;
  }
  .insight-block.success-block { border-color: var(--success); background: rgba(90,158,111,0.05); }
  .insight-block .ib-tag { font-size: 0.6rem; color: var(--amber-dim); text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 5px; }
  .insight-block.success-block .ib-tag { color: var(--success); }
  .insight-block p { font-size: 0.8rem; line-height: 1.65; color: var(--text); }

  .modal-next {
    margin-top: 20px; padding: 12px 16px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    font-size: 0.73rem; color: var(--muted); line-height: 1.5;
  }
  .modal-next strong { color: var(--amber); }

  .modal-close {
    width: 100%; margin-top: 16px; padding: 13px;
    border: 1px solid var(--border); border-radius: 8px;
    background: transparent; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .modal-close:hover { border-color: var(--amber-dim); color: var(--text); }

  /* Start time section */
  .start-section {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; margin-bottom: 16px;
  }
  .start-section-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.13em; margin-bottom: 12px; }

  .start-options { display: flex; gap: 8px; margin-bottom: 12px; }
  .opt-btn {
    flex: 1; padding: 9px 8px;
    border: 1px solid var(--border); border-radius: 7px;
    background: transparent; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 0.06em;
    cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .opt-btn.active { border-color: var(--amber-dim); color: var(--amber); background: var(--amber-glow); }
  .opt-btn:hover { border-color: var(--amber-dim); color: var(--text); }

  .time-input-wrap { display: none; gap: 8px; align-items: center; }
  .time-input-wrap.visible { display: flex; }
  .time-input-wrap input[type="datetime-local"] {
    flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 7px;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.78rem;
    padding: 9px 12px; outline: none; transition: border-color 0.2s; color-scheme: dark;
  }
  .time-input-wrap input:focus { border-color: var(--amber-dim); }

  /* Goal */
  .goal-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 16px; margin-bottom: 16px;
  }
  .goal-row label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; }
  .goal-row select { background: transparent; border: none; color: var(--amber); font-family: 'DM Mono', monospace; font-size: 0.85rem; cursor: pointer; outline: none; }
  .goal-row select option { background: #1e1a14; }

  /* Controls */
  .controls { display: flex; gap: 12px; margin-bottom: 28px; }
  .btn {
    flex: 1; padding: 14px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
  }
  .btn:hover { border-color: var(--amber-dim); background: var(--amber-glow); }
  .btn-primary { background: var(--amber); color: #0e0c09; border-color: var(--amber); font-weight: 500; }
  .btn-primary:hover { background: #f0b840; border-color: #f0b840; }
  .btn-danger { border-color: var(--danger); color: var(--danger); }
  .btn-danger:hover { background: rgba(192,80,58,0.12); }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .stat-card .s-label { font-size: 0.63rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.13em; margin-bottom: 6px; }
  .stat-card .s-val { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--text); line-height: 1; }
  .stat-card .s-sub { font-size: 0.65rem; color: var(--muted); margin-top: 3px; }

  /* History */
  .section-title { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 12px; }
  .history-list { display: flex; flex-direction: column; gap: 8px; }
  .history-item {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .h-left .h-date { font-size: 0.72rem; color: var(--muted); margin-bottom: 2px; }
  .h-left .h-dur { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--text); }
  .h-badge { font-size: 0.62rem; padding: 3px 9px; border-radius: 99px; text-transform: uppercase; letter-spacing: 0.1em; }
  .badge-success { background: rgba(90,158,111,0.18); color: var(--success); border: 1px solid rgba(90,158,111,0.3); }
  .badge-partial { background: rgba(232,166,48,0.12); color: var(--amber-dim); border: 1px solid rgba(232,166,48,0.2); }

  .empty-state { text-align: center; padding: 30px 0; color: var(--muted); font-size: 0.75rem; letter-spacing: 0.08em; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

  @keyframes pulse-ring {
    0%, 100% { filter: drop-shadow(0 0 6px rgba(232,166,48,0.3)); }
    50% { filter: drop-shadow(0 0 16px rgba(232,166,48,0.7)); }
  }
  .active-glow { animation: pulse-ring 3s ease-in-out infinite; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Fast</h1>
    <p>Intermittent Fasting Tracker</p>
  </header>

  <!-- Ring -->
  <div class="ring-section">
    <div class="ring-wrap" id="ringWrap">
      <svg width="220" height="220" viewBox="0 0 220 220">
        <circle class="ring-bg" cx="110" cy="110" r="95"/>
        <circle class="ring-prog" id="ringProg" cx="110" cy="110" r="95"
          stroke-dasharray="596.9" stroke-dashoffset="596.9"/>
      </svg>
      <div class="ring-center">
        <div class="ring-time" id="timerDisplay">00:00:00</div>
        <div class="ring-label" id="timerLabel">ready to fast</div>
      </div>
    </div>
    <div class="ring-phase" id="phaseLabel"></div>
    <div class="insight-trigger" id="insightTrigger">
      <button class="btn-insight" onclick="openInsight()">
        <span>🫀</span> What's happening in my body?
      </button>
    </div>
  </div>

  <!-- Start Time Picker -->
  <div class="start-section" id="startSection">
    <div class="start-section-label">When did you last eat?</div>
    <div class="start-options">
      <button class="opt-btn active" id="optNow" onclick="selectStartOpt('now')">Right Now</button>
      <button class="opt-btn" id="optCustom" onclick="selectStartOpt('custom')">Custom Time</button>
    </div>
    <div class="time-input-wrap" id="timeInputWrap">
      <input type="datetime-local" id="customTimeInput" />
    </div>
  </div>

  <!-- Goal -->
  <div class="goal-row">
    <label>Fasting Goal</label>
    <select id="goalSelect">
      <option value="12">12 hours</option>
      <option value="16" selected>16 hours</option>
      <option value="18">18 hours</option>
      <option value="20">20 hours</option>
      <option value="24">24 hours</option>
      <option value="36">36 hours</option>
      <option value="48">48 hours</option>
    </select>
  </div>

  <!-- Buttons -->
  <div class="controls" id="controls">
    <button class="btn btn-primary" onclick="startFast()">Start Fast</button>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="s-label">Total Fasts</div>
      <div class="s-val" id="statTotal">0</div>
      <div class="s-sub">completed</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Longest Fast</div>
      <div class="s-val" id="statLongest">—</div>
      <div class="s-sub">personal best</div>
    </div>
    <div class="stat-card">
      <div class="s-label">This Week</div>
      <div class="s-val" id="statWeek">0</div>
      <div class="s-sub">fasts completed</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Avg Duration</div>
      <div class="s-val" id="statAvg">—</div>
      <div class="s-sub">per fast</div>
    </div>
  </div>

  <hr class="divider">

  <div class="section-title">Past Fasts</div>
  <div class="history-list" id="historyList">
    <div class="empty-state">No fasts recorded yet.<br>Start your first fast above.</div>
  </div>
</div>

<!-- Body Insight Modal -->
<div class="modal-overlay" id="insightModal" onclick="handleOverlayClick(event)">
  <div class="modal-panel" id="modalPanel">
    <div class="modal-handle"></div>
    <div class="modal-phase-tag" id="modalPhaseTag"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalInsights"></div>
    <div class="modal-next" id="modalNext" style="display:none"></div>
    <button class="modal-close" onclick="closeInsight()">Close</button>
  </div>
</div>

<script>
const CIRC = 2 * Math.PI * 95;

// ─── Phase / Insight Data ────────────────────────────────────────────────────
const PHASES = [
  {
    minH: 0, maxH: 2,
    name: 'Digestion & Absorption',
    title: 'Your body is processing your last meal',
    insights: [
      { tag: 'Blood Sugar', success: false,
        body: 'Blood glucose is rising as carbohydrates from your meal are broken down and absorbed. Your pancreas is actively releasing insulin to shuttle glucose into your cells for immediate energy or storage as glycogen.' },
      { tag: 'Fat Burning', success: false,
        body: 'Fat burning is essentially paused right now. Elevated insulin is a storage signal — it tells your fat cells to hold on to their contents and prevents fatty acids from being released into the bloodstream.' },
      { tag: 'What to Expect', success: false,
        body: 'A temporary energy lift followed by a gentle dip is normal. Your body is doing exactly what it should — efficiently processing your meal. Stay hydrated and let the digestion process run its course.' }
    ],
    nextH: 4,
    nextTeaser: 'At 4 hours, insulin begins to fall and your body starts shifting away from meal-derived glucose toward stored fuel.'
  },
  {
    minH: 2, maxH: 4,
    name: 'Post-Meal Settling',
    title: 'Insulin is beginning to fall',
    insights: [
      { tag: 'Blood Sugar', success: false,
        body: 'Blood glucose is returning toward its fasting baseline. Insulin levels are declining as the glucose from your meal has been distributed. Your pancreas is easing off, and blood sugar is stabilizing.' },
      { tag: 'Fat Burning', success: false,
        body: 'Fat burning remains low, but the environment is shifting. As insulin falls, the "lock" on your fat cells gradually loosens. Your body is preparing for the metabolic transition ahead.' },
      { tag: 'What to Expect', success: false,
        body: 'You may notice a mild hunger signal — this is usually just your body checking in, not true physiological hunger. It typically passes within 15–20 minutes. Water or black coffee can help bridge the gap.' }
    ],
    nextH: 4,
    nextTeaser: 'At 4 hours, your liver begins tapping its glycogen stores — the last sugar reserves before fat becomes the primary fuel.'
  },
  {
    minH: 4, maxH: 8,
    name: 'Glycogen Depletion Begins',
    title: 'Your liver is now managing blood sugar',
    insights: [
      { tag: 'Blood Sugar', success: false,
        body: 'Blood sugar is stable and approaching its true fasting range. The liver is releasing glucose from its glycogen stores (your body\'s short-term sugar reserve) to keep the brain and organs supplied without any food input.' },
      { tag: 'Fat Burning', success: false,
        body: 'Fat oxidation is picking up meaningfully. With insulin low, the hormone glucagon is rising and sending signals to fat cells to begin releasing fatty acids. Your muscles are starting to prefer fat over glucose as their fuel source.' },
      { tag: 'What to Expect', success: false,
        body: 'Many people notice improved focus and mental clarity at this stage. This is your metabolic engine warming up. A slight lightness or calm energy is common — your body is adapting beautifully to the fasted state.' }
    ],
    nextH: 8,
    nextTeaser: 'Around 8 hours, liver glycogen runs significantly lower and fat burning accelerates into a higher gear.'
  },
  {
    minH: 8, maxH: 12,
    name: 'Active Fat Burning',
    title: 'Your body is actively burning stored fat',
    insights: [
      { tag: 'Blood Sugar', success: true,
        body: 'Blood glucose is at a clean, stable fasting level — no spikes, no crashes. Insulin is at its lowest point since your last meal. This low-insulin environment is the key that unlocks fat stores and makes the next phase possible.' },
      { tag: 'Fat Burning', success: true,
        body: 'This is where real progress happens. With glycogen depleted and insulin low, your body is releasing fatty acids from adipose tissue at a meaningful rate and burning them for energy in your cells. You are actively consuming stored body fat right now.' },
      { tag: 'What to Expect', success: false,
        body: 'Hunger often stabilizes at this point as your body finds its rhythm burning fat. Energy tends to feel steadier than it does on glucose — fat provides a more sustained, even burn without the peaks and valleys.' }
    ],
    nextH: 12,
    nextTeaser: 'At 12 hours, the liver begins producing ketones — a powerful brain fuel made directly from fat.'
  },
  {
    minH: 12, maxH: 16,
    name: 'Ketone Production',
    title: 'Your liver is making ketones from fat',
    insights: [
      { tag: 'Blood Sugar', success: true,
        body: 'Blood sugar is at its stable fasting baseline and being maintained entirely through your liver\'s own glucose production (gluconeogenesis). Glucagon is directing this process precisely, keeping your brain fueled without a single gram of dietary carbs.' },
      { tag: 'Fat Burning', success: true,
        body: 'Fat burning is now substantial and measurable. The liver is converting fatty acids into ketone bodies — primarily beta-hydroxybutyrate (BHB) — which your brain, heart, and muscles can use as a highly efficient fuel source. This is your body operating in a fat-adapted metabolic state.' },
      { tag: 'What to Expect', success: false,
        body: 'Many people report notable mental clarity and reduced hunger at this stage. Ketones are a very clean fuel for the brain — they provide steady energy without the glucose fluctuations that drive cravings. You may feel surprisingly good.' }
    ],
    nextH: 16,
    nextTeaser: 'At 16 hours you hit the sweet spot most IF protocols target — deep metabolic fat burning and significant insulin sensitivity gains.'
  },
  {
    minH: 16, maxH: 20,
    name: 'Peak Fat-Burning Zone',
    title: 'You\'ve reached the 16-hour milestone 🔥',
    insights: [
      { tag: 'Insulin Sensitivity', success: true,
        body: 'Insulin sensitivity is dramatically improved at this point. Your cells have become significantly more responsive to insulin, meaning when you do eat again, your body will handle glucose far more efficiently — a key long-term benefit for blood sugar management and metabolic health.' },
      { tag: 'Fat Burning', success: true,
        body: 'This is the zone most intermittent fasting research is designed around. Ketone levels in your blood are measurably elevated. Growth hormone — which both preserves lean muscle and mobilizes fat stores — has surged significantly compared to your fed state. Your body is running on fat.' },
      { tag: 'What to Expect', success: true,
        body: 'This is the payoff. Hunger is often quite low because ketones provide stable, sustained brain fuel. Many people feel a quiet, focused energy. This is exactly the metabolic state that makes 16:8 fasting so widely practiced and studied.' }
    ],
    nextH: 24,
    nextTeaser: 'Beyond 20 hours, autophagy intensifies — your cells begin a powerful self-cleaning and regeneration process.'
  },
  {
    minH: 20, maxH: 24,
    name: 'Deep Ketosis',
    title: 'Deep fat burning and cellular repair underway',
    insights: [
      { tag: 'Blood Sugar', success: true,
        body: 'Blood glucose regulation is highly refined at this stage. Insulin is at its floor and cells are maximally insulin-sensitive. This extended low-insulin state is linked in research to reduced systemic inflammation and improved long-term metabolic markers.' },
      { tag: 'Fat Burning', success: true,
        body: 'Fat oxidation is at its peak. Ketone bodies are your primary fuel system. Research on extended fasting in this range shows significant reductions in visceral fat — the metabolically active fat stored around organs — when practiced consistently over time.' },
      { tag: 'Autophagy', success: false,
        body: 'Your body has activated autophagy — a cellular housekeeping process where damaged proteins and dysfunctional organelles are broken down and recycled for cellular components. This process is associated with longevity, reduced disease risk, and cellular renewal.' }
    ],
    nextH: 24,
    nextTeaser: 'At 24 hours, autophagy is fully established. You are in extended fasting territory with powerful metabolic effects.'
  },
  {
    minH: 24, maxH: 9999,
    name: 'Extended Fast',
    title: 'Running entirely on fat and ketones',
    insights: [
      { tag: 'Blood Sugar', success: true,
        body: 'Blood sugar is managed entirely through your liver\'s own synthesis of glucose. There is no dietary glucose in your system. Insulin is at its absolute baseline floor. This is a profound metabolic state that your body is designed to enter and sustain.' },
      { tag: 'Fat Burning', success: true,
        body: 'You are in deep fat-burning territory. Your brain is running primarily on ketones (BHB), which research suggests may be a superior cognitive fuel compared to glucose. Fatty acid oxidation is maximal, and your body is consuming stored fat at a meaningful rate.' },
      { tag: 'Important Note', success: false,
        body: 'Extended fasting beyond 24 hours is powerful but warrants care. Stay well hydrated and consider electrolytes — sodium, potassium, and magnesium — to support your body through this phase. Always listen to your signals and break the fast if you feel unwell.' }
    ],
    nextH: null,
    nextTeaser: null
  }
];

function getPhaseData(hours) {
  return PHASES.find(p => hours >= p.minH && hours < p.maxH) || PHASES[PHASES.length - 1];
}

// ─── State ───────────────────────────────────────────────────────────────────
let state = JSON.parse(localStorage.getItem('fastState3') || 'null') || {
  active: false, startTime: null, goalHours: 16, history: []
};

let ticker = null;
let startMode = 'now';

// ─── DOM ─────────────────────────────────────────────────────────────────────
const ringProg = document.getElementById('ringProg');
const ringWrap = document.getElementById('ringWrap');
const timerDisplay = document.getElementById('timerDisplay');
const timerLabel = document.getElementById('timerLabel');
const phaseLabel = document.getElementById('phaseLabel');
const controls = document.getElementById('controls');
const goalSelect = document.getElementById('goalSelect');
const startSection = document.getElementById('startSection');
const insightTrigger = document.getElementById('insightTrigger');
const customInput = document.getElementById('customTimeInput');

goalSelect.value = state.goalHours;
goalSelect.addEventListener('change', () => { state.goalHours = parseInt(goalSelect.value); save(); });
customInput.value = toLocalDatetimeInput(new Date());

// ─── Utils ───────────────────────────────────────────────────────────────────
function save() { localStorage.setItem('fastState3', JSON.stringify(state)); }
function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }
function fmtDuration(ms) {
  const h = ms / 3600000;
  if (h < 1) return `${Math.floor(ms/60000)}m`;
  return `${Math.floor(h)}h ${pad((ms % 3600000) / 60000)}m`;
}
function fmtHMS(ms) {
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return `${pad(h)}:${pad(m)}:${pad(s)}`;
}
function toLocalDatetimeInput(d) {
  const off = d.getTimezoneOffset();
  return new Date(d.getTime() - off * 60000).toISOString().slice(0, 16);
}

// ─── Start options ────────────────────────────────────────────────────────────
function selectStartOpt(mode) {
  startMode = mode;
  document.getElementById('optNow').classList.toggle('active', mode === 'now');
  document.getElementById('optCustom').classList.toggle('active', mode === 'custom');
  document.getElementById('timeInputWrap').classList.toggle('visible', mode === 'custom');
  if (mode === 'custom') { customInput.value = toLocalDatetimeInput(new Date()); customInput.focus(); }
}

// ─── Fast controls ────────────────────────────────────────────────────────────
function startFast() {
  let start;
  if (startMode === 'custom') {
    if (!customInput.value) { alert('Please select a start time.'); return; }
    start = new Date(customInput.value).getTime();
    if (start > Date.now()) { alert('Start time cannot be in the future.'); return; }
  } else {
    start = Date.now();
  }
  state.active = true;
  state.startTime = start;
  save();
  startTicker();
  updateUI();
}

function endFast() {
  if (!state.startTime) return;
  const duration = Date.now() - state.startTime;
  state.history.push({ start: state.startTime, end: Date.now(), duration, goal: state.goalHours });
  state.active = false;
  state.startTime = null;
  save();
  stopTicker();
  selectStartOpt('now');
  updateUI();
  renderHistory();
  updateStats();
}

function startTicker() { stopTicker(); ticker = setInterval(updateUI, 1000); }
function stopTicker() { if (ticker) { clearInterval(ticker); ticker = null; } }

// ─── UI ───────────────────────────────────────────────────────────────────────
function updateUI() {
  if (!state.active || !state.startTime) {
    ringProg.style.strokeDashoffset = CIRC;
    ringProg.style.stroke = 'var(--amber)';
    timerDisplay.textContent = '00:00:00';
    timerLabel.textContent = 'ready to fast';
    phaseLabel.textContent = '';
    ringWrap.classList.remove('active-glow');
    insightTrigger.classList.remove('visible');
    startSection.style.display = 'block';
    controls.innerHTML = `<button class="btn btn-primary" onclick="startFast()">Start Fast</button>`;
    goalSelect.disabled = false;
    return;
  }

  const elapsed = Date.now() - state.startTime;
  const goalMs = state.goalHours * 3600000;
  const pct = Math.min(elapsed / goalMs, 1);
  const hours = elapsed / 3600000;
  const pd = getPhaseData(hours);

  ringProg.style.strokeDashoffset = CIRC * (1 - pct);
  ringProg.style.stroke = pct >= 1 ? 'var(--success)' : 'var(--amber)';
  timerDisplay.textContent = fmtHMS(elapsed);
  timerLabel.textContent = pct >= 1 ? 'goal reached!' : `of ${state.goalHours}h goal`;
  phaseLabel.textContent = pd.name;
  ringWrap.classList.add('active-glow');
  insightTrigger.classList.add('visible');
  startSection.style.display = 'none';
  controls.innerHTML = `<button class="btn btn-danger" onclick="endFast()">End Fast</button>`;
  goalSelect.disabled = true;
  updateStats();
}

function updateStats() {
  const hist = state.history;
  document.getElementById('statTotal').textContent = hist.length;
  if (hist.length === 0) {
    document.getElementById('statLongest').textContent = '—';
    document.getElementById('statAvg').textContent = '—';
  } else {
    document.getElementById('statLongest').textContent = fmtDuration(Math.max(...hist.map(h => h.duration)));
    document.getElementById('statAvg').textContent = fmtDuration(hist.reduce((a, b) => a + b.duration, 0) / hist.length);
  }
  const weekAgo = Date.now() - 7 * 86400000;
  document.getElementById('statWeek').textContent = hist.filter(h => h.end > weekAgo).length;
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (state.history.length === 0) {
    list.innerHTML = '<div class="empty-state">No fasts recorded yet.<br>Start your first fast above.</div>';
    return;
  }
  list.innerHTML = [...state.history].reverse().slice(0, 10).map(h => {
    const date = new Date(h.end).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const goalMet = h.duration >= h.goal * 3600000;
    return `<div class="history-item">
      <div class="h-left">
        <div class="h-date">${date}</div>
        <div class="h-dur">${fmtDuration(h.duration)}</div>
      </div>
      <span class="h-badge ${goalMet ? 'badge-success' : 'badge-partial'}">${goalMet ? 'Goal Met' : 'Partial'}</span>
    </div>`;
  }).join('');
}

// ─── Insight modal ────────────────────────────────────────────────────────────
function openInsight() {
  if (!state.active || !state.startTime) return;
  const hours = (Date.now() - state.startTime) / 3600000;
  const pd = getPhaseData(hours);

  document.getElementById('modalPhaseTag').textContent = pd.name;
  document.getElementById('modalTitle').textContent = pd.title;
  document.getElementById('modalInsights').innerHTML = pd.insights.map(ins => `
    <div class="insight-block ${ins.success ? 'success-block' : ''}">
      <div class="ib-tag">${ins.tag}</div>
      <p>${ins.body}</p>
    </div>
  `).join('');

  const nextEl = document.getElementById('modalNext');
  if (pd.nextTeaser) {
    nextEl.innerHTML = `<strong>Coming up →</strong> ${pd.nextTeaser}`;
    nextEl.style.display = 'block';
  } else {
    nextEl.style.display = 'none';
  }

  document.getElementById('insightModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeInsight() {
  document.getElementById('insightModal').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('insightModal')) closeInsight();
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
updateStats();
renderHistory();
if (state.active && state.startTime) {
  startSection.style.display = 'none';
  startTicker();
  updateUI();
}
</script>
</body>
</html>
